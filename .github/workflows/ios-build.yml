name: Build & Upload Landlord iOS

# ─────────────────────────────────────────────────────────────────────────
# Mirrors the tenant app's ios-build.yml with three key differences:
#   1. Bundle ID is com.moveoutshield.landlord (not the tenant ID)
#   2. App name is "MoveOut Shield Landlord"
#   3. Info.plist gets the .mosinsp UTI declarations so the app shows
#      up in the share sheet for any incoming .mosinsp file
#
# Required GitHub Secrets (separate landlord cert + profile):
#   IOS_CERTIFICATE_BASE64        — base64-encoded landlord distribution .p12
#   IOS_CERTIFICATE_PASSWORD      — password for the .p12
#   IOS_PROVISION_PROFILE_BASE64  — base64-encoded landlord provisioning profile
#   APPSTORE_ISSUER_ID            — App Store Connect API issuer (shared)
#   APPSTORE_KEY_ID               — App Store Connect API key ID (shared)
#   APPSTORE_PRIVATE_KEY          — App Store Connect API .p8 contents (shared)
#
# Note: APPSTORE_* secrets can be the SAME as tenant if both apps live under
# the same App Store Connect account. IOS_* secrets MUST be landlord-specific.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-26
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Remove stale iOS project
        run: rm -rf ios

      - name: Sync Capacitor (CocoaPods mode)
        run: npx cap add ios --packagemanager CocoaPods && npx cap sync ios

      - name: Generate app icons and splash screens
        run: npx @capacitor/assets generate --ios --assetPath resources --iosProject ios/App

      - name: Add Info.plist permissions
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'MoveOut Shield Landlord needs camera access to document property condition with photos.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'MoveOut Shield Landlord may read inspection photos from your photo library.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'MoveOut Shield Landlord saves inspection photos to a MoveOut Shield Landlord album in your photo library for easy reference.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'MoveOut Shield Landlord tags your inspection photos with GPS location for legal documentation purposes.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'MoveOut Shield Landlord tags your inspection photos with GPS location for legal documentation purposes.'" ios/App/App/Info.plist

      # ─── Add UTI declarations for .mosinsp ───────────────────────────────
      # Two pieces required:
      #   1. UTExportedTypeDeclarations — declares the UTI exists
      #   2. CFBundleDocumentTypes — registers the app as a handler
      # Together these make MoveOut Shield Landlord appear in the share sheet
      # for any .mosinsp file the user receives via Mail, Messages, AirDrop, etc.
      - name: Add .mosinsp UTI declarations to Info.plist
        run: |
          PLIST="ios/App/App/Info.plist"

          # Declare the UTI
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0 dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeIdentifier string 'com.moveoutshield.inspection'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeDescription string 'MoveOut Shield Inspection Bundle'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo:0 string 'public.data'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo:1 string 'public.content'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension:0 string 'mosinsp'" "$PLIST"

          # Register the app as a handler for the UTI
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0 dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:CFBundleTypeName string 'MoveOut Shield Inspection'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSHandlerRank string 'Owner'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes:0 string 'com.moveoutshield.inspection'" "$PLIST"

          echo "UTI declarations added"

      - name: Add PrivacyInfo.xcprivacy
        run: |
          # Write the privacy manifest into the app target folder
          cat > ios/App/App/PrivacyInfo.xcprivacy << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSPrivacyTracking</key>
            <false/>
            <key>NSPrivacyTrackingDomains</key>
            <array/>
            <key>NSPrivacyAccessedAPITypes</key>
            <array>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryFileTimestamp</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>C617.1</string>
                </array>
              </dict>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryUserDefaults</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>CA92.1</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          # Register the file in the Xcode project's Copy Bundle Resources phase
          # (file on disk alone is not enough — Xcode needs it in project.pbxproj)
          ruby <<'RUBY'
          require 'xcodeproj'
          project_path = 'ios/App/App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'App' }
          abort 'ERROR: App target not found in project.pbxproj' unless target

          app_group = project.main_group['App'] || project.main_group
          filename  = 'PrivacyInfo.xcprivacy'

          existing = app_group.files.find { |f| f.path == filename }
          if existing
            puts "PrivacyInfo.xcprivacy already registered — skipping"
          else
            file_ref = app_group.new_reference(filename)
            target.resources_build_phase.add_file_reference(file_ref)
            project.save
            puts "PrivacyInfo.xcprivacy added to App target resources"
          end
          RUBY

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Create ExportOptions.plist
        run: |
          mkdir -p ios
          cat > ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>8Z7U5ZLH9J</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.moveoutshield.landlord</key>
              <string>MoveOutShield Landlord Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Install iOS platform
        run: |
          # Warm up CoreSimulatorService — xcodebuild -downloadPlatform talks to it
          # internally and occasionally gets "Unable to connect to simulator" if the
          # service hasn't started yet on a fresh runner.
          xcrun simctl list runtimes >/dev/null 2>&1 || true
          xcodebuild -downloadPlatform iOS

      - name: Build .ipa
        run: |
          cd ios/App

          # Guard: fail loudly if Capacitor template no longer contains expected string
          if ! grep -q "CODE_SIGN_STYLE = Automatic;" App.xcodeproj/project.pbxproj; then
            echo "ERROR: 'CODE_SIGN_STYLE = Automatic;' not found in project.pbxproj."
            echo "The Capacitor iOS template has likely changed. Signing patches will not apply."
            echo "Current CODE_SIGN_* lines in pbxproj:"
            grep -n "CODE_SIGN" App.xcodeproj/project.pbxproj || true
            exit 1
          fi

          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' App.xcodeproj/project.pbxproj
          sed -i '' '/CODE_SIGN_STYLE = Manual;/a\
                          CODE_SIGN_IDENTITY = "iPhone Distribution";\
                          PROVISIONING_PROFILE_SPECIFIER = "MoveOutShield Landlord Distribution";
          ' App.xcodeproj/project.pbxproj
          cd ../..

          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM=8Z7U5ZLH9J \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=0.3.9 \
            archive

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ipa/App.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
